name: Release

# 两种触发方式:
#   1) 手动一键发版(推荐):Actions 页 Run workflow 填版本号,或
#      `gh workflow run release.yml -f version=0.3.1`
#      —— 服务端自动 bump 版本号、提交、编译、打 tag 并发布,本地零操作。
#   2) 兼容旧流程:手动 push 一个 v* tag 也会触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号(如 0.3.1,可含或不含前缀 v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # 解析出本次发布的 tag 与要编译的 git ref;手动触发时顺便 bump 版本号并提交到 main。
  prep:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Resolve tag / bump version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ inputs.version }}"
            ver="${ver#v}"   # 去掉可能的前缀 v
            # bump Cargo.toml 的 [package] version(首个 version= 行)
            sed -i "0,/^version = /s//version = \"$ver\"/" Cargo.toml
            # 同步 Cargo.lock 里 stockrs 包的版本
            sed -i "/^name = \"stockrs\"/{n;s/^version = .*/version = \"$ver\"/}" Cargo.lock
            git config user.name "wnzzer"
            git config user.email "wnzzer@outlook.com"
            git add Cargo.toml Cargo.lock
            git commit -m "chore: 版本号 → $ver"
            git push origin HEAD:main
            echo "tag=v$ver" >> "$GITHUB_OUTPUT"
            echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build ${{ matrix.target }}
    needs: prep
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # UPX 压缩二进制(仅 Linux/Windows;macOS 因签名/支持问题跳过)。
      # continue-on-error:UPX 万一失败也不阻断发布,退回未压缩二进制。
      - name: Compress with UPX (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          upx --best --lzma "target/${{ matrix.target }}/release/stockrs"

      - name: Compress with UPX (Windows)
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        shell: pwsh
        run: |
          choco install upx -y
          upx --best --lzma "target/${{ matrix.target }}/release/stockrs.exe"

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          bin="target/${{ matrix.target }}/release/stockrs"
          tar -czf "stockrs-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" stockrs
          shasum -a 256 "stockrs-${{ matrix.target }}.tar.gz" > "stockrs-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/stockrs.exe"
          Compress-Archive -Path $bin -DestinationPath "stockrs-${{ matrix.target }}.zip"
          (Get-FileHash "stockrs-${{ matrix.target }}.zip" -Algorithm SHA256).Hash | Out-File "stockrs-${{ matrix.target }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stockrs-${{ matrix.target }}
          path: |
            stockrs-${{ matrix.target }}.*

  release:
    name: publish release
    needs: [prep, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # tag_name 不存在时,action-gh-release 会用 GITHUB_TOKEN 在 target_commitish 上
      # 创建该 tag(GITHUB_TOKEN 触发的事件不会再触发本工作流,故不会二次发布)。
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          target_commitish: ${{ needs.prep.outputs.ref }}
          files: dist/*
          generate_release_notes: true
