name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # UPX 压缩二进制(仅 Linux/Windows;macOS 因签名/支持问题跳过)。
      # continue-on-error:UPX 万一失败也不阻断发布,退回未压缩二进制。
      - name: Compress with UPX (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          upx --best --lzma "target/${{ matrix.target }}/release/stockrs"

      - name: Compress with UPX (Windows)
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        shell: pwsh
        run: |
          choco install upx -y
          upx --best --lzma "target/${{ matrix.target }}/release/stockrs.exe"

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          bin="target/${{ matrix.target }}/release/stockrs"
          tar -czf "stockrs-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" stockrs
          shasum -a 256 "stockrs-${{ matrix.target }}.tar.gz" > "stockrs-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/stockrs.exe"
          Compress-Archive -Path $bin -DestinationPath "stockrs-${{ matrix.target }}.zip"
          (Get-FileHash "stockrs-${{ matrix.target }}.zip" -Algorithm SHA256).Hash | Out-File "stockrs-${{ matrix.target }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stockrs-${{ matrix.target }}
          path: |
            stockrs-${{ matrix.target }}.*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
